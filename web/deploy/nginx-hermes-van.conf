# nginx site config for hermes.vintek.io
#
# - TLS 1.3 only via Certbot
# - Strict CSP, HSTS preload, COOP/COEP
# - Reverse proxy to hermes-van on 127.0.0.1:3015
# - SSE-friendly: proxy_buffering off for /auth/* and /api/* streaming endpoints

# Redirect bare http
server {
    listen 80;
    listen [::]:80;
    server_name hermes.vintek.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hermes.vintek.io;

    # ── TLS (managed by Certbot) ───────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/hermes.vintek.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hermes.vintek.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    ssl_protocols       TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── Security headers ────────────────────────────────────────────────
    # HSTS: 2 years + preload. Submit to https://hstspreload.org once stable.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Strict CSP. WebAuthn is fine without unsafe-eval.
    # 'unsafe-inline' on style-src is the Tailwind-runtime fallback.
    # Phase 5 hardening: drop 'unsafe-inline' once we ship CSS via classes only.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Disable old protocols on response
    server_tokens off;
    client_max_body_size 4M;

    # ── Reverse proxy to hermes-van ─────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3015;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # SSE / streaming endpoints. Phase 2 will add /api/chat/run/*/events.
    # Disable buffering so tokens reach the client in real time.
    location ~ ^/api/(chat/run|.*\/stream) {
        proxy_pass http://127.0.0.1:3015;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 6h;
        chunked_transfer_encoding on;
    }

    # ── Lock down sensitive paths ───────────────────────────────────────
    location ~ /\.(env|git|ht) {
        deny all;
        return 404;
    }
}
