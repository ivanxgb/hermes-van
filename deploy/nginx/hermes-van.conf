# hermes-van — TLS-terminating reverse proxy.
#
# Domain: hermes.vintek.io (configurable — see ${SERVER_NAME} below).
# Backend: Hono app listening on 127.0.0.1:${HERMES_VAN_PORT} (default 3015).
#
# This config:
#   - Forces HTTPS via 301 on :80
#   - Terminates TLS via certs from Certbot (/etc/letsencrypt/...)
#   - Sets HSTS (1y, includeSubDomains, preload-ready)
#   - Proxies / and /assets to Vite-built static files via proxy_pass
#     (the Hono server in production serves the built bundle from dist/
#     so we delegate to it; alternative: nginx alias to dist/ directly)
#   - Enables SSE: disables proxy_buffering, raises read/send timeouts
#   - Adds security headers (CSP nonce-managed by the app — keep this
#     header generic so nginx doesn't fight the app)
#   - Hides the gateway: only the app is reachable from the public side
#
# Install:
#   sudo cp deploy/nginx/hermes-van.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/hermes-van.conf \
#              /etc/nginx/sites-enabled/hermes-van.conf
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name hermes.vintek.io;

    # ACME http-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hermes.vintek.io;

    # Certbot will populate these. If you change the domain,
    # re-run scripts/certbot.sh to re-issue.
    ssl_certificate     /etc/letsencrypt/live/hermes.vintek.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hermes.vintek.io/privkey.pem;

    # Modern TLS posture (Mozilla "intermediate" — broad client coverage).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling (Certbot writes the chain into fullchain.pem).
    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS — once you commit, the domain stays HTTPS. Drop preload from
    # this header until you've submitted the domain to hstspreload.org.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Conservative defenses. The app sets its own CSP — do NOT set one
    # here or it'll merge unpredictably across nginx + Hono middleware.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Hide nginx version
    server_tokens off;

    # Don't buffer requests — clients streaming uploads (none today, but
    # keeps the door open for future file upload).
    client_max_body_size 25m;
    client_body_timeout 60s;

    # ── Service worker scope ────────────────────────────────────────
    # The SW must be served from the root scope. Add a header to keep
    # browsers from caching it forever — push notifications break the
    # day you ship a SW change otherwise.
    location = /sw.js {
        proxy_pass http://127.0.0.1:3015;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
    }

    # ── SSE (server-sent events) ────────────────────────────────────
    # /api/runs/:id/events streams forever. Disable proxy buffering so
    # tokens reach the browser as they arrive, raise read timeout to
    # allow long agent runs, and disable HTTP/1.1 chunked re-encoding.
    location ~ ^/api/runs/[^/]+/events$ {
        proxy_pass http://127.0.0.1:3015;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        chunked_transfer_encoding off;
    }

    # ── Everything else ─────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3015;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Don't proxy hidden files (dotfile dump prevention).
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
